<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Data Persistence Fixes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>TrackingListApp Data Persistence Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Contact Merging</h2>
        <button onclick="testContactMerging()">Run Contact Test</button>
        <div id="contact-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Group Merging</h2>
        <button onclick="testGroupMerging()">Run Group Test</button>
        <div id="group-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: localStorage Operations</h2>
        <button onclick="testLocalStorage()">Run localStorage Test</button>
        <div id="storage-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 4: Clear All Data</h2>
        <button onclick="clearTestData()">Clear Test Data</button>
        <div id="clear-result" class="result"></div>
    </div>

    <script>
        // Copy the fixed functions from the main app
        function mergeArray(defaultArray, savedArray) {
            const combined = [...defaultArray, ...savedArray];
            const unique = [...new Set(combined)];
            return unique.sort();
        }

        function mergeContacts(defaultContacts, savedContacts) {
            const contactMap = new Map();
            
            defaultContacts.forEach(contact => {
                contactMap.set(contact.email, contact);
            });
            
            savedContacts.forEach(contact => {
                contactMap.set(contact.email, contact);
            });
            
            return Array.from(contactMap.values()).sort((a, b) => a.name.localeCompare(b.name));
        }

        function mergeGroups(defaultGroups, savedGroups) {
            const groupMap = new Map();
            
            defaultGroups.forEach(group => {
                groupMap.set(group.name, group);
            });
            
            savedGroups.forEach(group => {
                groupMap.set(group.name, group);
            });
            
            return Array.from(groupMap.values()).sort((a, b) => a.name.localeCompare(b.name));
        }

        async function saveData(data) {
            try {
                localStorage.setItem('workTrackerData', JSON.stringify(data));
                return { success: true };
            } catch (error) {
                console.error('Error saving data:', error);
                return { success: false, error: error.message };
            }
        }

        function loadData() {
            try {
                const stored = localStorage.getItem('workTrackerData');
                return stored ? JSON.parse(stored) : null;
            } catch (error) {
                console.error('Error loading data:', error);
                return null;
            }
        }

        function testContactMerging() {
            const resultDiv = document.getElementById('contact-result');
            
            const defaultContacts = [
                { name: 'John Intel', email: 'john@intel.com' },
                { name: 'Sarah Dell', email: 'sarah@dell.com' }
            ];

            const savedContacts = [
                { name: 'Mike AMD', email: 'mike@amd.com' },
                { name: 'Jane Foxconn', email: 'jane@foxconn.com' },
                { name: 'John Intel Updated', email: 'john@intel.com' } // Duplicate email
            ];

            try {
                const merged = mergeContacts(defaultContacts, savedContacts);
                
                const success = merged.length === 4 && 
                               merged.find(c => c.email === 'john@intel.com').name === 'John Intel Updated';
                
                resultDiv.innerHTML = `
                    <div class="${success ? 'success' : 'error'}">
                        <strong>Test ${success ? 'PASSED' : 'FAILED'}</strong><br>
                        Expected: 4 contacts, John Intel updated<br>
                        Got: ${merged.length} contacts<br>
                        Contacts: ${merged.map(c => c.name).join(', ')}<br>
                        John Intel: ${merged.find(c => c.email === 'john@intel.com').name}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Test FAILED: ${error.message}</div>`;
            }
        }

        function testGroupMerging() {
            const resultDiv = document.getElementById('group-result');
            
            const defaultGroups = [
                { name: 'Intel Team', contacts: ['John Intel'] },
                { name: 'Dell Team', contacts: ['Sarah Dell'] }
            ];

            const savedGroups = [
                { name: 'AMD Team', contacts: ['Mike AMD'] },
                { name: 'Intel Team', contacts: ['John Intel', 'Mike AMD'] } // Duplicate name
            ];

            try {
                const merged = mergeGroups(defaultGroups, savedGroups);
                
                const success = merged.length === 3 && 
                               merged.find(g => g.name === 'Intel Team').contacts.length === 2;
                
                resultDiv.innerHTML = `
                    <div class="${success ? 'success' : 'error'}">
                        <strong>Test ${success ? 'PASSED' : 'FAILED'}</strong><br>
                        Expected: 3 groups, Intel Team updated<br>
                        Got: ${merged.length} groups<br>
                        Groups: ${merged.map(g => g.name).join(', ')}<br>
                        Intel Team contacts: ${merged.find(g => g.name === 'Intel Team').contacts.join(', ')}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Test FAILED: ${error.message}</div>`;
            }
        }

        async function testLocalStorage() {
            const resultDiv = document.getElementById('storage-result');
            
            const testData = {
                workItems: [],
                referenceData: {
                    contacts: [
                        { name: 'Test Contact', email: 'test@example.com' }
                    ],
                    groups: [
                        { name: 'Test Group', contacts: ['Test Contact'] }
                    ]
                }
            };

            try {
                // Test save
                const saveResult = await saveData(testData);
                if (!saveResult.success) {
                    throw new Error('Save failed: ' + saveResult.error);
                }

                // Test load
                const loadedData = loadData();
                if (!loadedData) {
                    throw new Error('Load returned null');
                }

                const success = loadedData.referenceData.contacts.length === 1 && 
                               loadedData.referenceData.groups.length === 1;

                resultDiv.innerHTML = `
                    <div class="${success ? 'success' : 'error'}">
                        <strong>Test ${success ? 'PASSED' : 'FAILED'}</strong><br>
                        Data saved and loaded successfully<br>
                        Contacts: ${loadedData.referenceData.contacts.length}<br>
                        Groups: ${loadedData.referenceData.groups.length}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Test FAILED: ${error.message}</div>`;
            }
        }

        function clearTestData() {
            const resultDiv = document.getElementById('clear-result');
            
            try {
                localStorage.removeItem('workTrackerData');
                resultDiv.innerHTML = '<div class="success">Test data cleared successfully</div>';
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Clear FAILED: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
